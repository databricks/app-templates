name: Check for leaked workspace values

on:
  push:
    paths:
      - 'agent-*/**'
      - '.scripts/check_template_leaks.py'
  pull_request:
    paths:
      - 'agent-*/**'
      - '.scripts/check_template_leaks.py'

jobs:
  check-leaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Check for leaked workspace values
        run: python .scripts/check_template_leaks.py
