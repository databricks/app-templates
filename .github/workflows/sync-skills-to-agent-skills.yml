name: Sync skills to databricks-agent-skills

# app-templates is the source of truth for the agent-template skills. When the
# skills under .claude/skills/ change on the default branch, mirror them into
# databricks/databricks-agent-skills (flat skills/databricks-agent-<name>/ layout)
# and open/update a PR there. The downstream PR is reviewed + merged by
# databricks-agent-skills maintainers — this workflow only proposes changes.
#
# Requires a repo-scoped token for databricks/databricks-agent-skills with
# permission to push branches and open PRs, stored as the secret
# AGENT_SKILLS_SYNC_TOKEN (PAT or GitHub App token). The default GITHUB_TOKEN
# cannot push to another repository.

on:
  push:
    branches: [main, master]
    paths:
      - '.claude/skills/**'
      - '.scripts/sync-skills-to-agent-skills.py'
      - '.github/workflows/sync-skills-to-agent-skills.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout app-templates (source of truth)
        uses: actions/checkout@v4
        with:
          path: app-templates

      - name: Checkout databricks-agent-skills (sync target)
        uses: actions/checkout@v4
        with:
          repository: databricks/databricks-agent-skills
          token: ${{ secrets.AGENT_SKILLS_SYNC_TOKEN }}
          path: agent-skills

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Render + sync skills, regenerate manifest
        run: |
          python3 app-templates/.scripts/sync-skills-to-agent-skills.py \
            --target "${GITHUB_WORKSPACE}/agent-skills"

      - name: Open or update PR on databricks-agent-skills
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.AGENT_SKILLS_SYNC_TOKEN }}
          path: agent-skills
          branch: sync/app-templates-skills
          commit-message: "chore: sync app-templates skills"
          title: "Sync app-templates skills"
          body: |
            Automated mirror of the agent-template skills from
            [databricks/app-templates](https://github.com/databricks/app-templates)
            (`.claude/skills/`), the source of truth.

            Generated by `.scripts/sync-skills-to-agent-skills.py` from
            app-templates commit ${{ github.sha }}.

            Do not hand-edit `skills/databricks-agent-*` here — changes go to
            app-templates and re-sync automatically.
          delete-branch: true
          add-paths: |
            skills/databricks-agent-*
            manifest.json
