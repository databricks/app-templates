bundle:
  name: agent_claude_sdk_long_running_agent

resources:
  apps:
    agent_claude_sdk_long_running_agent:
      name: "agent-claude-sdk-lra"
      description: "Claude Agent SDK long-running agent application"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_AUTOSCALING_ENDPOINT
            value_from: "postgres"
          - name: AI_GATEWAY_URL
            value: "https://2309167578215964.ai-gateway.cloud.databricks.com/anthropic"
          - name: LOG_LEVEL
            value: "INFO"
      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "1095947298049155"
            permission: 'CAN_MANAGE'
        - name: 'postgres'
          postgres:
            branch: "projects/c1f428b3-9d5f-48f9-a012-5f413a8bca63/branches/br-super-forest-d25sy2iq"
            database: "projects/c1f428b3-9d5f-48f9-a012-5f413a8bca63/branches/br-super-forest-d25sy2iq/databases/db-compat-55540"
            permission: 'CAN_CONNECT_AND_CREATE'

targets:
  dev:
    mode: development
    default: true
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        agent_claude_sdk_long_running_agent:
          name: agent-claude-sdk-lra
