bundle:
  name: agent_langgraph_long_term_memory

resources:
  apps:
    agent_langgraph_long_term_memory:
      name: "agent-langgraph-ltm"
      description: "LangGraph agent application with long-term memory"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_AUTOSCALING_PROJECT
            value: "j-provisioned-new"
          - name: LAKEBASE_AUTOSCALING_BRANCH
            value: "j-provisioned-new-branch"

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "2633712184954322"
            permission: 'CAN_MANAGE'

targets:
  dev:
    mode: development
    default: true
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        agent_langgraph_long_term_memory:
          name: agent-langgraph-ltm
