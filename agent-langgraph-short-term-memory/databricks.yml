bundle:
  name: agent_langgraph_short_term_memory

resources:
  apps:
    agent_langgraph_short_term_memory:
      name: "agent-j-auto-ls"
      description: "LangGraph agent application with short-term memory"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: LAKEBASE_AUTOSCALING_PROJECT
            value: "j-autoscaling6"
          - name: LAKEBASE_AUTOSCALING_BRANCH
            value: "j-autoscaling6-branch"
          - name: PGENDPOINT
            value_from: postgres

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "3164172780813008"
            permission: 'CAN_MANAGE'
        - name: 'postgres'
          postgres:
            branch: '<your-branch-resource-path>'
            database: '<your-branch-resource-path>/databases/<your-database-instance>'
            permission: 'CAN_CONNECT_AND_CREATE'

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    resources:
      apps:
        agent_langgraph_short_term_memory:
          name: agent-j-auto-ls
