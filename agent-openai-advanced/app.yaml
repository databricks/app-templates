command: ["uv", "run", "start-app"]
# databricks apps listen by default on port 8000

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  # API_PROXY points the Node AI SDK at the Express /invocations handler
  # (port 3000), which rewrites to background mode and auto-resumes on
  # disconnect. AGENT_BACKEND_URL is where that handler forwards.
  - name: API_PROXY
    value: "http://localhost:3000/invocations"
  - name: AGENT_BACKEND_URL
    value: "http://localhost:8000/invocations"
  - name: CHAT_APP_PORT
    value: "3000"
  - name: CHAT_PROXY_TIMEOUT_SECONDS
    value: "300"
  - name: MLFLOW_EXPERIMENT_ID
    valueFrom: "experiment"
  - name: LAKEBASE_AUTOSCALING_ENDPOINT
    valueFrom: "postgres"
