bundle:
  name: agent_openai_advanced

resources:
  apps:
    agent_openai_advanced:
      name: "dhruv-agent-openai-adv-durable"
      description: "OpenAI Agents SDK agent with short-term memory and long-running
        background task support"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app", "--no-ui"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_INSTANCE_NAME
            value_from: "database"
          - name: LOG_LEVEL
            value: "INFO"
          # Temporary: exposes /_debug/kill_task/{id} for integration tests
          # that simulate pod crashes without restarting the app. Remove
          # before any production use.
          - name: LONG_RUNNING_ENABLE_DEBUG_KILL
            value: "1"
      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "1490685316442238"
            permission: 'CAN_MANAGE'
        - name: 'database'
          database:
            instance_name: 'dhruv-gupta'
            database_name: 'databricks_postgres'
            permission: 'CAN_CONNECT_AND_CREATE'

targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    resources:
      apps:
        agent_openai_advanced:
          name: dhruv-agent-openai-adv-durable
