bundle:
  name: agent_openai_advanced

resources:
  apps:
    agent_openai_advanced:
      name: "agent-openai-advanced"
      description: "OpenAI Agents SDK agent with short-term memory and long-running
        background task support"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_AUTOSCALING_ENDPOINT
            value_from: "postgres"
          - name: LOG_LEVEL
            value: "INFO"
      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "3629566331088829"
            permission: 'CAN_MANAGE'
        - name: 'postgres'
          postgres:
            endpoint: "projects/bryan-agent-integ-tests/branches/test-5b1e7d74/endpoints/primary"
            branch: "projects/bryan-agent-integ-tests/branches/test-5b1e7d74"
            database: "projects/bryan-agent-integ-tests/branches/test-5b1e7d74/databases/db-3yt6-hsl9xi9k3t"
            permission: 'CAN_CONNECT_AND_CREATE'

targets:
  dev:
    mode: development
    default: true
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        agent_openai_advanced:
          name: agent-openai-adv
