bundle:
  name: agent_openai_agents_sdk_short_term_memory

resources:
  # Lakebase autoscaling resources for short-term memory
  # TODO: The resource names below (lakebase_project, lakebase_branch, lakebase_endpoint)
  # are user-defined. Update them along with their placeholder values (project_id, branch_id)
  # to match your actual Lakebase autoscaling configuration.
  # Any references to these names (e.g. ${resources.postgres_projects.lakebase_project.id})
  # must also be updated if you rename them.
  postgres_projects:
    lakebase_project:
      project_id: '<your-project-id>'
      display_name: 'Short-Term Memory Database'
      pg_version: 17

  postgres_branches:
    lakebase_branch:
      parent: ${resources.postgres_projects.lakebase_project.id}
      branch_id: '<your-branch-id>'
      is_protected: false
      no_expiry: true

  postgres_endpoints:
    lakebase_endpoint:
      parent: ${resources.postgres_branches.lakebase_branch.id}
      endpoint_id: primary
      endpoint_type: ENDPOINT_TYPE_READ_WRITE
      autoscaling_limit_min_cu: 0.5
      autoscaling_limit_max_cu: 4

  apps:
    agent_openai_agents_sdk_short_term_memory:
      name: "agent-openai-sdk-stm"
      description: "OpenAI Agents SDK agent application with short-term memory"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          # Use for provisioned lakebase resource
          # - name: LAKEBASE_INSTANCE_NAME
          #   value: "<your-lakebase-instance-name>"

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: ""
            permission: 'CAN_MANAGE'
        # Use for autoscaling lakebase resource (recommended)
        - name: 'postgres'
          postgres:
            branch: ${resources.postgres_branches.lakebase_branch.id}
            database: ${resources.postgres_branches.lakebase_branch.id}/databases/postgres
            permission: 'CAN_CONNECT_AND_CREATE'
        # Use for provisioned lakebase resource
        # - name: 'database'
        #   database:
        #     instance_name: '<your-lakebase-instance-name>'
        #     database_name: 'databricks_postgres'
        #     permission: 'CAN_CONNECT_AND_CREATE'

targets:
  dev:
    mode: development
    default: true
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        agent_openai_agents_sdk_short_term_memory:
          name: agent-openai-sdk-stm
