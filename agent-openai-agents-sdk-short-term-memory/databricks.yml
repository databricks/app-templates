bundle:
  name: agent_openai_agents_sdk_short_term_memory

resources:
  postgres_projects:
    lakebase_project:
      project_id: "<your-project-id>"

  postgres_branches:
    lakebase_branch:
      branch_id: "<your-branch-id>"
      parent: ${resources.postgres_projects.lakebase_project.name}
      no_expiry: true

  apps:
    agent_openai_agents_sdk_short_term_memory:
      name: "agent-openai-sdk-stm"
      description: "OpenAI Agents SDK agent application with short-term memory"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          # Autoscaling Lakebase config
          - name: LAKEBASE_AUTOSCALING_PROJECT
            value: "<your-project-name>"
          - name: LAKEBASE_AUTOSCALING_BRANCH
            value: "<your-branch-name>"

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: ""
            permission: 'CAN_MANAGE'
        - name: 'postgres'
          postgres:
            branch: ${resources.postgres_branches.lakebase_branch.name}
            permission: 'CAN_CONNECT_AND_CREATE'

targets:
  dev:
    mode: development
    default: true
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        agent_openai_agents_sdk_short_term_memory:
          name: agent-openai-sdk-stm
