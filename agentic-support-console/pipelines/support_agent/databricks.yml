bundle:
  name: support_agent

include:
  - resources/*.yml

variables:
  catalog:
    description: The Unity Catalog catalog for reading silver/gold and writing output
  endpoint:
    description: The AI Gateway model serving endpoint to use

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: REPLACE_ME # e.g. https://my-workspace.cloud.databricks.com
    variables:
      catalog: REPLACE_ME # your Unity Catalog catalog name
      endpoint: databricks-gpt-5-4-mini

  prod:
    mode: production
    workspace:
      host: REPLACE_ME
    variables:
      catalog: REPLACE_ME
      endpoint: databricks-gpt-5-4-mini
