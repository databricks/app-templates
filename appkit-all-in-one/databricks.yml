bundle:
  name: appkit-all-in-one

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID
  genie_space_id:
    description: Default Genie Space ID
  genie_space_name:
    description: Genie Space for AI-powered data queries. Space IDs configured via plugin config.

resources:
  apps:
    app:
      name: "appkit-all-in-one"
      description: "Full-stack Node.js app with SQL analytics dashboards and Genie AI conversations"
      source_code_path: ./
      user_api_scopes:
        - dashboards.genie

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: genie-space
          genie_space:
            name: ${var.genie_space_name}
            space_id: ${var.genie_space_id}
            permission: CAN_RUN

targets:
  default:
    default: true
    workspace:
      host: https://your-workspace.cloud.databricks.com

    variables:
      sql_warehouse_id: placeholder
      genie_space_id: placeholder
