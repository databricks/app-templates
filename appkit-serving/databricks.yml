bundle:
  name: appkit-serving

sync:
  exclude:
    # Lockfile is shipped in the repo so `databricks apps init` can run `npm ci`
    # locally, but we deliberately keep it OUT of the bundle upload: the Databricks
    # Apps Linux build container then runs a fresh `npm install`, avoiding the
    # platform-specific binary resolution issues a macOS-generated lockfile causes.
    - 'package-lock.json'

variables:
  serving_endpoint_name:
    description: Serving endpoint name

resources:
  apps:
    app:
      name: "appkit-serving"
      description: "Node.js app with Databricks Model Serving endpoint integration"
      source_code_path: ./
      user_api_scopes:
        - serving.serving-endpoints

      # The resources which this app has access to.
      resources:
        - name: serving-endpoint
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY

targets:
  default:
    default: true
    workspace:
      host: https://your-workspace.cloud.databricks.com

    variables:
      serving_endpoint_name: placeholder
