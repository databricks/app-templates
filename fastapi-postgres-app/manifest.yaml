version: 1
name: "Lakebase Autoscaling FastAPI app"
description: "A FastAPI service that reads from a Lakebase Autoscaling (Postgres) database. Async SQLAlchemy + asyncpg, OAuth token refresh every 50 minutes, no front-end. Pairs with the cookbook recipe at apps-cookbook.dev/docs/fastapi/getting_started/lakebase_connection (adapted for Autoscale)."

resource_specs:
  - name: "postgres"
    description: "The Lakebase Autoscaling endpoint the app reads from."
    postgres_spec:
      permission: "CAN_CONNECT_AND_CREATE"
